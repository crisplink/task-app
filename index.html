<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#1D9E75">
  <meta name="msapplication-tap-highlight" content="no">
  <link rel="manifest" href="manifest.json">
  <title>My Task Manager</title>
</head>
<body>
<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  -webkit-tap-highlight-color: rgba(0,0,0,0) !important;
  -webkit-touch-callout: none;
  outline: none;
  user-select: none;
  -webkit-user-select: none;
}
input, textarea { user-select: text;
  -webkit-user-select: text;
}
button, div, input, a, span {
  -webkit-tap-highlight-color: transparent !important;
  tap-highlight-color: transparent !important;
}
button:focus, div:focus, input:focus, a:focus, span:focus {
  outline: none !important;
  box-shadow: none !important;
}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',Arial,sans-serif;color:#1a1a1a;padding:1.5rem;background:linear-gradient(145deg,#d4f0e8 0%,#e8f4fd 50%,#fde8f0 100%);min-height:100vh;transition:background .4s}
body.dark{background:linear-gradient(145deg,#0a1f1a 0%,#0d1a2e 50%,#1a0d1f 100%);color:#f0f0f0}
.header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.5rem}
.header-left h1{font-size:24px;font-weight:600;letter-spacing:-.3px}
.header-left .sub{font-size:13px;color:#666;margin-top:3px}
body.dark .header-left .sub{color:#aaa}
.theme-btn{width:40px;height:40px;border-radius:50%;border:1px solid rgba(255,255,255,0.6);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.5);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);transition:all .25s}
body.dark .theme-btn{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.2)}
.glass{background:rgba(255,255,255,0.55);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.7);border-radius:20px}
body.dark .glass{background:rgba(255,255,255,0.07);border-color:rgba(255,255,255,0.12)}
.progress-card{background:linear-gradient(135deg,rgba(15,110,86,0.85),rgba(29,158,117,0.85));backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.3);border-radius:20px;padding:1.1rem 1.35rem;margin-bottom:1.1rem}
.progress-label{display:flex;justify-content:space-between;font-size:13px;color:rgba(255,255,255,0.85);margin-bottom:9px}
.progress-bar{height:7px;background:rgba(255,255,255,0.25);border-radius:99px;overflow:hidden}
.progress-fill{height:100%;background:rgba(255,255,255,0.9);border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.save-status{font-size:11px;color:rgba(255,255,255,0.6);margin-top:6px;text-align:right}
.add-card{padding:1rem 1.35rem;margin-bottom:1rem;overflow:visible;position:relative;z-index:100}
.add-card label{display:block;font-size:11px;font-weight:600;color:rgba(15,110,86,0.8);letter-spacing:.6px;margin-bottom:8px;text-transform:uppercase}
body.dark .add-card label{color:rgba(93,202,165,0.9)}
.add-row{display:flex;gap:8px;flex-wrap:wrap}
.task-input{flex:1;min-width:140px;font-size:14px;border:1px solid rgba(255,255,255,0.6);border-radius:12px;padding:0 14px;height:40px;background:rgba(255,255,255,0.5);color:#1a1a1a;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);transition:border .2s,background .2s}
body.dark .task-input{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.15);color:#f0f0f0}
.task-input::placeholder{color:rgba(0,0,0,0.3)}
body.dark .task-input::placeholder{color:rgba(255,255,255,0.3)}
.task-input:focus{outline:none;border-color:rgba(29,158,117,0.6);background:rgba(255,255,255,0.8)}
body.dark .task-input:focus{background:rgba(255,255,255,0.12)}
.time-btn{height:40px;padding:0 14px;border:1px solid rgba(29,158,117,0.35);border-radius:12px;background:rgba(225,245,238,0.7);color:#0F6E56;font-size:13px;cursor:pointer;white-space:nowrap;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);transition:background .18s}
body.dark .time-btn{background:rgba(29,158,117,0.15);border-color:rgba(93,202,165,0.3);color:#5DCAA5}
.time-btn:hover{background:rgba(159,225,203,0.7)}
.time-btn.set{background:rgba(29,158,117,0.85);color:#fff;border-color:transparent}
.btn-add{padding:0 18px;height:40px;border:none;border-radius:12px;background:linear-gradient(135deg,#1D9E75,#0F6E56);color:#fff;font-size:14px;font-weight:500;cursor:pointer;transition:opacity .18s}
.btn-add:hover{opacity:.88}
.btn-add:active{transform:scale(0.97)}
.custom-sel{position:relative;height:40px;min-width:110px}
.custom-sel-btn{height:40px;width:100%;padding:0 34px 0 14px;border:1px solid rgba(255,255,255,0.6);border-radius:12px;background:rgba(255,255,255,0.5);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);color:#1a1a1a;font-size:13px;font-weight:500;cursor:pointer;text-align:left;transition:border .18s,background .18s;display:flex;align-items:center;justify-content:space-between;gap:6px;white-space:nowrap}
body.dark .custom-sel-btn{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.15);color:#f0f0f0}
.custom-sel-btn:hover{background:rgba(255,255,255,0.7)}
body.dark .custom-sel-btn:hover{background:rgba(255,255,255,0.12)}
.custom-sel-btn svg{flex-shrink:0;transition:transform .2s}
.custom-sel.open .custom-sel-btn svg{transform:rotate(180deg)}
.custom-sel-menu{position:absolute;top:calc(100% + 6px);left:0;min-width:100%;background:rgba(255,255,255,0.88);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,0.8);border-radius:14px;overflow:hidden;z-index:600;opacity:0;transform:translateY(-6px) scale(0.97);pointer-events:none;transition:opacity .18s,transform .18s}
body.dark .custom-sel-menu{background:rgba(25,40,35,0.95);border-color:rgba(255,255,255,0.12)}
.custom-sel.open .custom-sel-menu{opacity:1;transform:translateY(0) scale(1);pointer-events:all}
.custom-sel-opt{padding:10px 16px;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:8px;transition:background .15s;color:#1a1a1a}
body.dark .custom-sel-opt{color:#f0f0f0}
.custom-sel-opt:hover{background:rgba(29,158,117,0.12)}
body.dark .custom-sel-opt:hover{background:rgba(29,158,117,0.2)}
.custom-sel-opt.selected{background:rgba(29,158,117,0.1);color:#0F6E56}
body.dark .custom-sel-opt.selected{background:rgba(29,158,117,0.25);color:#5DCAA5}
.opt-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.opt-high .opt-dot{background:#D85A30}
.opt-med .opt-dot{background:#EF9F27}
.opt-low .opt-dot{background:#639922}
.main-tabs{display:flex;gap:4px;margin-bottom:1.1rem;background:rgba(255,255,255,0.4);border:1px solid rgba(255,255,255,0.6);border-radius:14px;padding:4px;position:relative;z-index:10}
body.dark .main-tabs{background:rgba(255,255,255,0.07);border-color:rgba(255,255,255,0.12)}
.main-tab{flex:1;height:34px;border:none;font-size:13px;font-weight:500;cursor:pointer;background:transparent;color:#666;border-radius:10px;transition:background .2s,color .2s}
body.dark .main-tab{color:#aaa}
.main-tab.active{background:rgba(255,255,255,0.85);color:#0F6E56}
body.dark .main-tab.active{background:rgba(255,255,255,0.12);color:#5DCAA5}
.filters{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap}
.filter-btn{font-size:12px;padding:6px 14px;border-radius:99px;border:1px solid rgba(255,255,255,0.5);background:rgba(255,255,255,0.4);color:#555;cursor:pointer;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);transition:all .18s;font-weight:500}
body.dark .filter-btn{background:rgba(255,255,255,0.07);border-color:rgba(255,255,255,0.12);color:#aaa}
.filter-btn.active.f-all{background:rgba(83,74,183,0.85);color:#fff;border-color:transparent}
.filter-btn.active.f-active{background:rgba(24,95,165,0.85);color:#fff;border-color:transparent}
.filter-btn.active.f-done{background:rgba(59,109,17,0.85);color:#fff;border-color:transparent}
.filter-btn.active.f-high{background:rgba(153,60,29,0.85);color:#fff;border-color:transparent}
.filter-btn.active.f-med{background:rgba(133,79,11,0.85);color:#fff;border-color:transparent}
.filter-btn.active.f-low{background:rgba(59,109,17,0.85);color:#fff;border-color:transparent}
.task-list{display:flex;flex-direction:column;gap:8px}
.task{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:16px;background:rgba(255,255,255,0.55);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-left:3px solid transparent;border-top:1px solid rgba(255,255,255,0.7);border-right:1px solid rgba(255,255,255,0.4);border-bottom:1px solid rgba(255,255,255,0.4);transition:opacity .2s}
body.dark .task{background:rgba(255,255,255,0.06);border-top-color:rgba(255,255,255,0.1);border-right-color:rgba(255,255,255,0.06);border-bottom-color:rgba(255,255,255,0.06)}
.task.p-high{border-left-color:#D85A30}.task.p-med{border-left-color:#EF9F27}.task.p-low{border-left-color:#639922}
.task.done{opacity:.45}
.task.done .task-name{text-decoration:line-through;color:#888}
.checkbox{width:23px;height:23px;border-radius:7px;border:2px solid rgba(29,158,117,0.7);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;background:rgba(255,255,255,0.4)}
.checkbox:hover{background:rgba(225,245,238,0.8)}
.checkbox.checked{background:#1D9E75;border-color:#1D9E75}
.check-svg{width:12px;height:12px;stroke:#fff;stroke-width:2.5;fill:none;display:none}
.checkbox.checked .check-svg{display:block}
.task-name{flex:1;font-size:14px;font-weight:400}
body.dark .task-name{color:#f0f0f0}
.task-meta{display:flex;align-items:center;gap:6px;flex-shrink:0}
.badge{font-size:11px;padding:3px 10px;border-radius:99px;font-weight:600}
.badge-high{background:rgba(250,236,231,0.9);color:#993C1D}
.badge-med{background:rgba(250,238,218,0.9);color:#854F0B}
.badge-low{background:rgba(234,243,222,0.9);color:#3B6D11}
body.dark .badge-high{background:rgba(153,60,29,0.3);color:#F09575}
body.dark .badge-med{background:rgba(133,79,11,0.3);color:#FAC775}
body.dark .badge-low{background:rgba(59,109,17,0.3);color:#97C459}
.time-tag{font-size:12px;color:#666;white-space:nowrap;background:rgba(255,255,255,0.6);padding:3px 9px;border-radius:99px;border:1px solid rgba(255,255,255,0.5)}
body.dark .time-tag{background:rgba(255,255,255,0.08);color:#aaa;border-color:rgba(255,255,255,0.1)}
.time-tag.overdue{color:#A32D2D;background:rgba(252,235,235,0.8)}
.time-tag.soon{color:#854F0B;background:rgba(250,238,218,0.8)}
.edit-btn{background:none;border:none;cursor:pointer;color:#aaa;font-size:14px;padding:2px 5px;border-radius:8px;transition:color .15s,background .15s}
.edit-btn:hover{color:#1D9E75;background:rgba(29,158,117,0.1)}
.del-btn{background:none;border:none;cursor:pointer;color:#aaa;font-size:15px;padding:2px 5px;border-radius:8px;transition:color .15s,background .15s}
.del-btn:hover{color:#A32D2D;background:rgba(252,235,235,0.7)}
.empty{text-align:center;padding:2.5rem;font-size:13px;color:#888;background:rgba(255,255,255,0.45);backdrop-filter:blur(16px);border-radius:20px;border:1px solid rgba(255,255,255,0.6)}
body.dark .empty{background:rgba(255,255,255,0.05);border-color:rgba(255,255,255,0.1)}
.hist-group{margin-bottom:1.35rem}
.hist-date{font-size:12px;font-weight:600;color:#0F6E56;background:rgba(225,245,238,0.8);border-radius:99px;padding:5px 14px;display:inline-block;margin-bottom:8px;border:1px solid rgba(159,225,203,0.5)}
body.dark .hist-date{background:rgba(29,158,117,0.15);color:#5DCAA5;border-color:rgba(93,202,165,0.2)}
.hist-task{display:flex;align-items:center;gap:10px;padding:11px 16px;border-radius:16px;background:rgba(255,255,255,0.45);backdrop-filter:blur(12px);border-left:3px solid transparent;border-top:1px solid rgba(255,255,255,0.65);border-right:1px solid rgba(255,255,255,0.35);border-bottom:1px solid rgba(255,255,255,0.35);margin-bottom:6px;opacity:.85}
body.dark .hist-task{background:rgba(255,255,255,0.05);border-top-color:rgba(255,255,255,0.08);border-right-color:rgba(255,255,255,0.04);border-bottom-color:rgba(255,255,255,0.04)}
.hist-task.p-high{border-left-color:#D85A30}.hist-task.p-med{border-left-color:#EF9F27}.hist-task.p-low{border-left-color:#639922}
.hist-task-name{flex:1;font-size:14px;color:#666}
body.dark .hist-task-name{color:#aaa}
.hist-done{width:18px;height:18px;border-radius:5px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.hist-done.yes{background:#1D9E75}.hist-done.no{background:#E24B4A}
.toast{position:fixed;top:16px;right:16px;background:rgba(15,110,86,0.9);backdrop-filter:blur(16px);color:#fff;border-radius:14px;border:1px solid rgba(255,255,255,0.3);padding:10px 16px;font-size:13px;display:none;z-index:999;max-width:240px}
.toast.show{display:block}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0);display:flex;align-items:center;justify-content:center;z-index:300;pointer-events:none;transition:background .25s}
.modal-overlay.open{background:rgba(0,0,0,0.25);backdrop-filter:blur(6px);pointer-events:all}
.edit-modal{background:rgba(255,255,255,0.82);backdrop-filter:blur(30px);border:1px solid rgba(255,255,255,0.85);border-radius:24px;padding:1.35rem;width:300px;transform:scale(0.88) translateY(16px);opacity:0;transition:transform .3s cubic-bezier(.34,1.56,.64,1),opacity .22s ease}
body.dark .edit-modal{background:rgba(20,40,32,0.92);border-color:rgba(255,255,255,0.12)}
.modal-overlay.open .edit-modal{transform:scale(1) translateY(0);opacity:1}
.edit-modal h3{font-size:16px;font-weight:600;margin-bottom:1rem;color:#0F6E56}
body.dark .edit-modal h3{color:#5DCAA5}
.edit-modal .field-label{font-size:11px;font-weight:600;color:rgba(15,110,86,0.7);letter-spacing:.5px;text-transform:uppercase;display:block;margin-bottom:5px;margin-top:12px}
body.dark .edit-modal .field-label{color:rgba(93,202,165,0.8)}
.edit-modal input[type=text]{width:100%;font-size:14px;border:1px solid rgba(255,255,255,0.6);border-radius:12px;padding:0 12px;height:40px;background:rgba(255,255,255,0.5);color:#1a1a1a;transition:border .2s}
body.dark .edit-modal input[type=text]{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.15);color:#f0f0f0}
.edit-modal input:focus{outline:none;border-color:rgba(29,158,117,0.6)}
.edit-time-row{display:flex;align-items:center;gap:8px;margin-top:4px}
.edit-time-btn{flex:1;height:40px;border:1px solid rgba(29,158,117,0.35);border-radius:12px;background:rgba(225,245,238,0.7);color:#0F6E56;font-size:13px;cursor:pointer;transition:background .18s}
body.dark .edit-time-btn{background:rgba(29,158,117,0.15);border-color:rgba(93,202,165,0.3);color:#5DCAA5}
.edit-time-btn.set{background:rgba(29,158,117,0.85);color:#fff;border-color:transparent}
.clear-time-btn{height:40px;padding:0 12px;border:1px solid rgba(226,75,74,0.3);border-radius:12px;background:rgba(252,235,235,0.7);color:#A32D2D;font-size:13px;cursor:pointer}
body.dark .clear-time-btn{background:rgba(162,45,45,0.15);border-color:rgba(226,75,74,0.3);color:#F09575}
.modal-actions{display:flex;gap:8px;margin-top:1.25rem}
.modal-actions button{flex:1;height:40px;border-radius:12px;font-size:14px;font-weight:500;cursor:pointer;transition:transform .12s}
.modal-actions button:active{transform:scale(0.97)}
.btn-modal-cancel{border:1px solid rgba(0,0,0,0.1);background:rgba(255,255,255,0.5);color:#666}
body.dark .btn-modal-cancel{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.15);color:#aaa}
.btn-modal-save{border:none;background:linear-gradient(135deg,#1D9E75,#0F6E56);color:#fff}
.clock-overlay{position:fixed;inset:0;background:rgba(0,0,0,0);display:flex;align-items:center;justify-content:center;z-index:400;pointer-events:none;transition:background .25s ease}
.clock-overlay.open{background:rgba(0,0,0,0.25);backdrop-filter:blur(6px);pointer-events:all}
.clock-modal{background:rgba(255,255,255,0.75);backdrop-filter:blur(30px);border:1px solid rgba(255,255,255,0.8);border-radius:24px;padding:1.35rem;width:290px;transform:scale(0.88) translateY(16px);opacity:0;transition:transform .3s cubic-bezier(.34,1.56,.64,1),opacity .22s ease}
body.dark .clock-modal{background:rgba(20,35,30,0.88);border-color:rgba(255,255,255,0.12)}
.clock-overlay.open .clock-modal{transform:scale(1) translateY(0);opacity:1}
.clock-display{text-align:center;font-size:40px;font-weight:600;margin-bottom:1rem;letter-spacing:2px;background:rgba(225,245,238,0.7);border-radius:14px;padding:10px;color:#085041;border:1px solid rgba(159,225,203,0.4)}
body.dark .clock-display{background:rgba(29,158,117,0.15);color:#5DCAA5;border-color:rgba(93,202,165,0.2)}
.clock-display span{padding:4px 10px;border-radius:10px;cursor:pointer;transition:background .18s,color .18s}
.clock-display span.active{background:#1D9E75;color:#fff}
.clock-face-wrap{display:flex;justify-content:center;margin-bottom:1rem}
.clock-face{position:relative;width:210px;height:210px;border-radius:50%;border:2px solid rgba(159,225,203,0.6);cursor:pointer;background:rgba(241,239,232,0.6)}
body.dark .clock-face{background:rgba(255,255,255,0.05);border-color:rgba(93,202,165,0.25)}
.clock-center{position:absolute;width:8px;height:8px;background:#1D9E75;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);z-index:2}
.clock-hand{position:absolute;bottom:50%;left:50%;transform-origin:bottom center;width:2px;margin-left:-1px;background:#1D9E75;border-radius:2px;z-index:1;transition:transform .35s cubic-bezier(.4,0,.2,1),height .2s ease}
.clock-hand.min-hand{background:#5DCAA5}
.clock-num{position:absolute;font-size:12px;font-weight:500;color:#085041;width:28px;height:28px;display:flex;align-items:center;justify-content:center;transform:translate(-50%,-50%);border-radius:50%;cursor:pointer;transition:all .18s}
body.dark .clock-num{color:#9FE1CB}
.clock-num:hover{background:rgba(29,158,117,0.2);transform:translate(-50%,-50%) scale(1.15)}
.clock-num.sel{background:#1D9E75;color:#fff;transform:translate(-50%,-50%) scale(1.15)}
.ampm-row{display:flex;gap:8px;justify-content:center;margin-bottom:1rem}
.ampm-btn{flex:1;height:36px;border:1px solid rgba(159,225,203,0.5);border-radius:12px;background:rgba(225,245,238,0.6);color:#0F6E56;font-size:13px;font-weight:500;cursor:pointer;transition:all .18s}
body.dark .ampm-btn{background:rgba(29,158,117,0.1);border-color:rgba(93,202,165,0.2);color:#5DCAA5}
.ampm-btn.active{background:#1D9E75;color:#fff;border-color:transparent}
body.dark .ampm-btn.active{background:#1D9E75;color:#fff;border-color:transparent}
.clock-actions{display:flex;gap:8px}
.clock-actions button{flex:1;height:38px;border-radius:12px;font-size:13px;font-weight:500;cursor:pointer;transition:transform .12s}
.clock-actions button:active{transform:scale(0.97)}
.btn-cancel{border:1px solid rgba(0,0,0,0.1);background:rgba(255,255,255,0.5);color:#666}
body.dark .btn-cancel{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.12);color:#aaa}
.btn-ok{border:none;background:linear-gradient(135deg,#1D9E75,#0F6E56);color:#fff}
.mode-label{text-align:center;font-size:11px;color:#0F6E56;margin-bottom:8px;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
body.dark .mode-label{color:#5DCAA5}
@keyframes confettiFall{0%{transform:translateY(0) rotate(0deg);opacity:1}90%{opacity:1}100%{transform:translateY(105vh) rotate(720deg);opacity:0}}
</style>

<div class="header">
  <div class="header-left"><h1>My tasks</h1><p class="sub" id="dateLabel"></p></div>
  <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>
</div>

<div class="progress-card">
  <div class="progress-label"><span>Today's progress</span><span id="progressText">0 / 0</span></div>
  <div style="display:flex;align-items:center;gap:10px">
    <div class="progress-bar" style="flex:1"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div id="doneBadge" style="display:none;width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,0.9);flex-shrink:0;align-items:center;justify-content:center;transition:transform .4s cubic-bezier(.34,1.56,.64,1)">
      <svg width="12" height="10" viewBox="0 0 12 10" fill="none"><polyline points="1,5 4.5,8.5 11,1" stroke="#1D9E75" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
  </div>
  <div class="save-status" id="saveStatus"></div>
</div>

<div class="add-card glass">
  <label>New task</label>
  <div class="add-row">
    <input type="text" class="task-input" id="taskInput" placeholder="What needs to be done?" />
    <button class="time-btn" id="timeBtn" onclick="openClock('add')">+ Set time</button>
    <div class="custom-sel" id="addPrioritySel">
      <button class="custom-sel-btn" onclick="toggleSel('addPrioritySel')">
        <span class="sel-label">Medium</span>
        <svg width="11" height="7" viewBox="0 0 11 7" fill="none"><polyline points="1,1 5.5,6 10,1" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="custom-sel-menu">
        <div class="custom-sel-opt opt-high" onclick="pickPriority('addPrioritySel','high')"><span class="opt-dot"></span>High</div>
        <div class="custom-sel-opt opt-med selected" onclick="pickPriority('addPrioritySel','med')"><span class="opt-dot"></span>Medium</div>
        <div class="custom-sel-opt opt-low" onclick="pickPriority('addPrioritySel','low')"><span class="opt-dot"></span>Low</div>
      </div>
    </div>
    <button class="btn-add" onclick="addTask()">Add task</button>
  </div>
</div>

<div class="main-tabs">
  <button class="main-tab active" id="tabToday" onclick="switchTab('today')">Today</button>
  <button class="main-tab" id="tabHistory" onclick="switchTab('history')">History</button>
</div>

<div id="todayView">
  <div class="filters">
    <button class="filter-btn f-all active" onclick="setFilter('all',this)">All</button>
    <button class="filter-btn f-active" onclick="setFilter('active',this)">Active</button>
    <button class="filter-btn f-done" onclick="setFilter('done',this)">Done</button>
    <button class="filter-btn f-high" onclick="setFilter('high',this)">High</button>
    <button class="filter-btn f-med" onclick="setFilter('med',this)">Medium</button>
    <button class="filter-btn f-low" onclick="setFilter('low',this)">Low</button>
  </div>
  <div class="task-list" id="taskList"></div>
  <div class="empty" id="emptyMsg" style="display:none">No tasks for today yet.</div>
</div>

<div id="historyView" style="display:none">
  <div id="historyList"></div>
  <div class="empty" id="emptyHistory" style="display:none">No history yet.</div>
</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="editOverlay">
  <div class="edit-modal">
    <h3>Edit task</h3>
    <span class="field-label">Task name</span>
    <input type="text" id="editName" placeholder="Task name..." />
    <span class="field-label">Reminder time</span>
    <div class="edit-time-row">
      <button class="edit-time-btn" id="editTimeBtn" onclick="openClock('edit')">+ Set time</button>
      <button class="clear-time-btn" onclick="clearEditTime()">Clear</button>
    </div>
    <span class="field-label">Priority</span>
    <div class="custom-sel" id="editPrioritySel" style="width:100%">
      <button class="custom-sel-btn" style="width:100%" onclick="toggleSel('editPrioritySel')">
        <span class="sel-label">Medium</span>
        <svg width="11" height="7" viewBox="0 0 11 7" fill="none"><polyline points="1,1 5.5,6 10,1" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="custom-sel-menu" style="width:100%">
        <div class="custom-sel-opt opt-high" onclick="pickPriority('editPrioritySel','high')"><span class="opt-dot"></span>High</div>
        <div class="custom-sel-opt opt-med selected" onclick="pickPriority('editPrioritySel','med')"><span class="opt-dot"></span>Medium</div>
        <div class="custom-sel-opt opt-low" onclick="pickPriority('editPrioritySel','low')"><span class="opt-dot"></span>Low</div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-modal-cancel" onclick="closeEdit()">Cancel</button>
      <button class="btn-modal-save" onclick="saveEdit()">Save</button>
    </div>
  </div>
</div>

<div class="clock-overlay" id="clockOverlay">
  <div class="clock-modal">
    <div class="clock-display">
      <span id="dispH" onclick="setClockMode('hour')">12</span>:<span id="dispM" onclick="setClockMode('min')">00</span>
    </div>
    <div class="mode-label" id="modeLabel">Select hour</div>
    <div class="clock-face-wrap">
      <div class="clock-face" id="clockFace">
        <div class="clock-center"></div>
        <div class="clock-hand" id="clockHand"></div>
      </div>
    </div>
    <div class="ampm-row">
      <button class="ampm-btn active" id="btnAM" onclick="setAMPM('AM')">AM</button>
      <button class="ampm-btn" id="btnPM" onclick="setAMPM('PM')">PM</button>
    </div>
    <div class="clock-actions">
      <button class="btn-cancel" onclick="closeClock()">Cancel</button>
      <button class="btn-ok" onclick="confirmTime()">OK</button>
    </div>
  </div>
</div>

<script>
const TODAY=new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
let tasks=[], filter='all', alerted=new Set();
let clockHour=12, clockMin=0, clockAMPM='AM', clockMode='hour', clockContext='add';
let selectedTime='', editSelectedTime='', lastHandAngle=0, editingId=null;
let wasComplete=false;

document.getElementById('dateLabel').textContent=new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
document.getElementById('taskInput').addEventListener('keydown',e=>{ if(e.key==='Enter') addTask(); });
document.getElementById('editName').addEventListener('keydown',e=>{ if(e.key==='Enter') saveEdit(); });

document.addEventListener('click',e=>{
  document.querySelectorAll('.custom-sel.open').forEach(sel=>{
    if(!sel.contains(e.target)) sel.classList.remove('open');
  });
});

function toggleSel(id){ const el=document.getElementById(id); const wasOpen=el.classList.contains('open'); document.querySelectorAll('.custom-sel.open').forEach(s=>s.classList.remove('open')); if(!wasOpen) el.classList.add('open'); }
function pickPriority(selId,val){ const el=document.getElementById(selId); el.querySelectorAll('.custom-sel-opt').forEach(o=>o.classList.remove('selected')); el.querySelector('.opt-'+val).classList.add('selected'); el.querySelector('.sel-label').textContent=val==='high'?'High':val==='med'?'Medium':'Low'; el.classList.remove('open'); }
function getSelVal(selId){ const el=document.getElementById(selId); if(el.querySelector('.opt-high.selected')) return 'high'; if(el.querySelector('.opt-low.selected')) return 'low'; return 'med'; }

function toggleTheme(){ const dark=document.body.classList.toggle('dark'); document.getElementById('themeBtn').textContent=dark?'☀️':'🌙'; localStorage.setItem('theme',dark?'dark':'light'); }
function loadTheme(){ if(localStorage.getItem('theme')==='dark'){ document.body.classList.add('dark'); document.getElementById('themeBtn').textContent='☀️'; } }

function saveTasks(){ const ss=document.getElementById('saveStatus'); try{ localStorage.setItem('mytasks_v1',JSON.stringify(tasks)); ss.textContent='Saved'; setTimeout(()=>ss.textContent='',2000); } catch(e){ ss.textContent='Save failed'; } }
function loadTasks(){ try{ const r=localStorage.getItem('mytasks_v1'); if(r) tasks=JSON.parse(r); }catch(e){ tasks=[]; } render(); }
function todayTasks(){ return tasks.filter(t=>t.date===TODAY); }
function historyTasks(){ return tasks.filter(t=>t.date!==TODAY); }

function switchTab(tab){ document.getElementById('tabToday').classList.toggle('active',tab==='today'); document.getElementById('tabHistory').classList.toggle('active',tab==='history'); document.getElementById('todayView').style.display=tab==='today'?'block':'none'; document.getElementById('historyView').style.display=tab==='history'?'block':'none'; if(tab==='history') renderHistory(); }

function openClock(ctx){ clockContext=ctx; clockMode='hour'; if(ctx==='edit'&&editSelectedTime){ const[h,m]=editSelectedTime.split(':').map(Number); clockAMPM=h>=12?'PM':'AM'; clockHour=(h%12)||12; clockMin=m; } else if(ctx==='add'&&selectedTime){ const[h,m]=selectedTime.split(':').map(Number); clockAMPM=h>=12?'PM':'AM'; clockHour=(h%12)||12; clockMin=m; } else{ clockHour=12; clockMin=0; clockAMPM='AM'; } document.getElementById('btnAM').classList.toggle('active',clockAMPM==='AM'); document.getElementById('btnPM').classList.toggle('active',clockAMPM==='PM'); renderClock(); document.getElementById('clockOverlay').classList.add('open'); }
function closeClock(){ document.getElementById('clockOverlay').classList.remove('open'); }
function setClockMode(m){ clockMode=m; renderClock(); }
function setAMPM(v){ clockAMPM=v; document.getElementById('btnAM').classList.toggle('active',v==='AM'); document.getElementById('btnPM').classList.toggle('active',v==='PM'); }

function renderClock(){
  const face=document.getElementById('clockFace');
  face.querySelectorAll('.clock-num').forEach(n=>n.remove());
  const r=78,cx=105,cy=105;
  document.getElementById('modeLabel').textContent=clockMode==='hour'?'Select hour':'Select minute';
  document.getElementById('dispH').classList.toggle('active',clockMode==='hour');
  document.getElementById('dispM').classList.toggle('active',clockMode==='min');
  if(clockMode==='hour'){
    for(let i=1;i<=12;i++){ const a=(i/12)*2*Math.PI-Math.PI/2,el=document.createElement('div'); el.className='clock-num'+(i===clockHour?' sel':''); el.textContent=i; el.style.left=(cx+r*Math.cos(a))+'px'; el.style.top=(cy+r*Math.sin(a))+'px'; el.onclick=()=>{ clockHour=i; updateDisplay(); clockMode='min'; renderClock(); }; face.appendChild(el); }
    setHandAngle((clockHour/12)*360,r-12,false);
  } else {
    [0,5,10,15,20,25,30,35,40,45,50,55].forEach(m=>{ const a=(m/60)*2*Math.PI-Math.PI/2,el=document.createElement('div'); el.className='clock-num'+(m===clockMin?' sel':''); el.textContent=m===0?'00':(m<10?'0'+m:m); el.style.left=(cx+r*Math.cos(a))+'px'; el.style.top=(cy+r*Math.sin(a))+'px'; el.onclick=()=>{ clockMin=m; updateDisplay(); renderClock(); }; face.appendChild(el); });
    setHandAngle((clockMin/60)*360,r-12,true);
  }
  updateDisplay();
}
function setHandAngle(target,len,isMin){ const hand=document.getElementById('clockHand'); let diff=target-lastHandAngle; if(diff>180) diff-=360; if(diff<-180) diff+=360; lastHandAngle+=diff; hand.style.height=len+'px'; hand.style.transform=`rotate(${lastHandAngle}deg)`; hand.className='clock-hand'+(isMin?' min-hand':''); }
function updateDisplay(){ document.getElementById('dispH').textContent=clockHour; document.getElementById('dispM').textContent=clockMin<10?'0'+clockMin:clockMin; }
function confirmTime(){ const h=clockAMPM==='PM'?(clockHour===12?12:clockHour+12):(clockHour===12?0:clockHour); const val=(h<10?'0'+h:h)+':'+(clockMin<10?'0'+clockMin:clockMin); const label=clockHour+':'+(clockMin<10?'0'+clockMin:clockMin)+' '+clockAMPM; if(clockContext==='add'){ selectedTime=val; const b=document.getElementById('timeBtn'); b.textContent=label; b.classList.add('set'); } else{ editSelectedTime=val; const b=document.getElementById('editTimeBtn'); b.textContent=label; b.classList.add('set'); } closeClock(); }

function addTask(){ const inp=document.getElementById('taskInput'); const name=inp.value.trim(); if(!name) return; tasks.push({id:Date.now(),name,time:selectedTime,priority:getSelVal('addPrioritySel'),done:false,date:TODAY}); inp.value=''; selectedTime=''; const b=document.getElementById('timeBtn'); b.textContent='+ Set time'; b.classList.remove('set'); pickPriority('addPrioritySel','med'); saveTasks(); render(); }
function openEdit(id){ const t=tasks.find(t=>t.id===id); if(!t) return; editingId=id; editSelectedTime=t.time||''; document.getElementById('editName').value=t.name; pickPriority('editPrioritySel',t.priority); const b=document.getElementById('editTimeBtn'); if(t.time){ b.textContent=fmt12(t.time); b.classList.add('set'); } else { b.textContent='+ Set time'; b.classList.remove('set'); } document.getElementById('editOverlay').classList.add('open'); setTimeout(()=>document.getElementById('editName').focus(),300); }
function closeEdit(){ document.getElementById('editOverlay').classList.remove('open'); editingId=null; }
function clearEditTime(){ editSelectedTime=''; const b=document.getElementById('editTimeBtn'); b.textContent='+ Set time'; b.classList.remove('set'); }
function saveEdit(){ const name=document.getElementById('editName').value.trim(); if(!name) return; const t=tasks.find(t=>t.id===editingId); if(!t) return; t.name=name; t.time=editSelectedTime; t.priority=getSelVal('editPrioritySel'); saveTasks(); render(); closeEdit(); }
function toggle(id){ const t=tasks.find(t=>t.id===id); if(t) t.done=!t.done; saveTasks(); render(); }
function remove(id){ tasks=tasks.filter(t=>t.id!==id); saveTasks(); render(); }
function setFilter(f,btn){ filter=f; document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); render(); }

function fmt12(t){ if(!t) return ''; const[h,m]=t.split(':').map(Number); return((h%12)||12)+':'+(m<10?'0'+m:m)+' '+(h>=12?'PM':'AM'); }
function timeStatus(t){ if(!t) return null; const now=new Date(),[h,m]=t.split(':').map(Number); const diff=(new Date(now.getFullYear(),now.getMonth(),now.getDate(),h,m)-now)/60000; return diff<0?'overdue':diff<=30?'soon':'ok'; }

function launchConfetti(){ const colors=['#1D9E75','#5DCAA5','#EF9F27','#D85A30','#534AB7','#E24B4A','#FAC775','#9FE1CB']; for(let i=0;i<60;i++){ const el=document.createElement('div'); const size=7+Math.random()*7,dur=1.6+Math.random()*1.2,delay=Math.random()*0.5; el.style.cssText=`position:fixed;top:-14px;left:${Math.random()*100}%;width:${size}px;height:${size}px;background:${colors[i%colors.length]};border-radius:${Math.random()>.5?'50%':'3px'};pointer-events:none;z-index:9999;animation:confettiFall ${dur}s ${delay}s linear forwards`; document.body.appendChild(el); setTimeout(()=>el.remove(),(dur+delay)*1000+100); } }
function checkAllDone(today){ const total=today.length,done=today.filter(t=>t.done).length; if(total>0&&done===total&&!wasComplete){ wasComplete=true; setTimeout(launchConfetti,500); } else if(done<total){ wasComplete=false; } }

function render(){
  const list=document.getElementById('taskList'),empty=document.getElementById('emptyMsg');
  const today=todayTasks();
  const done=today.filter(t=>t.done).length,total=today.length;
  document.getElementById('progressText').textContent=done+' / '+total;
  document.getElementById('progressFill').style.width=total?Math.round(done/total*100)+'%':'0%';
  const badge=document.getElementById('doneBadge');
  if(total>0&&done===total){ badge.style.display='flex'; setTimeout(()=>badge.style.transform='scale(1.2)',50); setTimeout(()=>badge.style.transform='scale(1)',300); } else{ badge.style.display='none'; badge.style.transform='scale(1)'; }
  checkAllDone(today);
  const visible=today.filter(t=>{ if(filter==='active') return !t.done; if(filter==='done') return t.done; if(filter==='high') return t.priority==='high'; if(filter==='med') return t.priority==='med'; if(filter==='low') return t.priority==='low'; return true; });
  if(!visible.length){ list.innerHTML=''; empty.style.display='block'; return; }
  empty.style.display='none';
  list.innerHTML=visible.map(t=>{ const s=timeStatus(t.time); return `<div class="task p-${t.priority}${t.done?' done':''}"><div class="checkbox${t.done?' checked':''}" onclick="toggle(${t.id})"><svg class="check-svg" viewBox="0 0 10 8"><polyline points="1,4 4,7 9,1"/></svg></div><span class="task-name">${t.name}</span><div class="task-meta">${t.time?`<span class="time-tag${s==='overdue'?' overdue':s==='soon'?' soon':''}">${fmt12(t.time)}</span>`:''}<span class="badge badge-${t.priority}">${t.priority==='high'?'High':t.priority==='med'?'Medium':'Low'}</span><button class="edit-btn" onclick="openEdit(${t.id})">✏️</button><button class="del-btn" onclick="remove(${t.id})">✕</button></div></div>`; }).join('');
}

function renderHistory(){
  const list=document.getElementById('historyList'),empty=document.getElementById('emptyHistory');
  const hist=historyTasks();
  if(!hist.length){ list.innerHTML=''; empty.style.display='block'; return; }
  empty.style.display='none';
  const grouped={};
  hist.forEach(t=>{ if(!grouped[t.date]) grouped[t.date]=[]; grouped[t.date].push(t); });
  const dates=Object.keys(grouped).sort((a,b)=>new Date(b)-new Date(a));
  list.innerHTML=dates.map(date=>{ const items=grouped[date],done=items.filter(t=>t.done).length; return `<div class="hist-group"><div style="display:flex;align-items:center;gap:10px;margin-bottom:8px"><span class="hist-date">${date}</span><span style="font-size:12px;color:#888">${done}/${items.length} completed</span></div>${items.map(t=>`<div class="hist-task p-${t.priority}"><div class="hist-done ${t.done?'yes':'no'}"><svg width="10" height="10" viewBox="0 0 10 8" fill="none" stroke="#fff" stroke-width="2.5">${t.done?'<polyline points="1,4 4,7 9,1"/>':'<line x1="2" y1="2" x2="8" y2="8"/><line x1="8" y1="2" x2="2" y2="8"/>'}</svg></div><span class="hist-task-name">${t.name}</span><div class="task-meta">${t.time?`<span class="time-tag">${fmt12(t.time)}</span>`:''}<span class="badge badge-${t.priority}">${t.priority==='high'?'High':t.priority==='med'?'Medium':'Low'}</span></div></div>`).join('')}</div>`; }).join('');
}

function showToast(msg){ const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),4000); }
function checkReminders(){ const now=new Date(); const cur=(now.getHours()<10?'0':'')+now.getHours()+':'+(now.getMinutes()<10?'0':'')+now.getMinutes(); tasks.forEach(t=>{ if(t.time&&!t.done&&t.time===cur&&!alerted.has(t.id)){ alerted.add(t.id); showToast('Reminder: '+t.name); } }); }

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('/task-app/sw.js')
      .then(()=>console.log('Offline ready!'))
      .catch(e=>console.log('SW error:',e));
  });
}

loadTheme();
loadTasks();
setInterval(checkReminders,30000);
</script>
</body>
</html>
